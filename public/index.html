<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Lumina Neo</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- Aurora Background -->
    <div class="aurora-bg" id="aurora-bg"></div>

    <div id="app">
        <!-- Top Header -->
        <header class="app-header">
            <!-- Theme Toggle -->
            <div class="header-side">
                <button id="theme-toggle-btn" class="header-btn theme-toggle" aria-label="Cycle theme (auto/light/dark)">
                    <!-- Auto: half-filled circle -->
                    <svg class="icon-auto" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="9"/>
                        <path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor" stroke="none"/>
                    </svg>
                    <!-- Light: sun -->
                    <svg class="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <!-- Dark: moon -->
                    <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                    </svg>
                </button>
            </div>

            <!-- Logo -->
            <div class="header-center">
                <div class="logo">Lumina Neo</div>
            </div>

            <!-- BG Color Picker -->
            <div class="header-side right">
                <div class="bg-picker-wrap">
                    <button id="bg-picker-btn" class="header-btn" aria-label="Change background color">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="13.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="10.5" r="2.5"/>
                            <circle cx="8.5" cy="7.5" r="2.5"/><circle cx="6.5" cy="12.5" r="2.5"/>
                            <path d="M12 22a9.96 9.96 0 01-8-16"/>
                        </svg>
                    </button>
                    <div id="bg-popover" class="bg-popover">
                        <button class="bg-swatch" data-bg="default" title="Default"></button>
                        <button class="bg-swatch" data-bg="ocean"   title="Ocean"></button>
                        <button class="bg-swatch" data-bg="sunset"  title="Sunset"></button>
                        <button class="bg-swatch" data-bg="forest"  title="Forest"></button>
                        <button class="bg-swatch" data-bg="rose"    title="Rose"></button>
                        <button class="bg-swatch" data-bg="mono"    title="Mono"></button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Scrollable Content -->
        <main id="tab-content" class="tab-content">
            <div id="home-tab" class="tab-pane active">
                <div class="card"><p>Loading...</p></div>
            </div>
            <div id="locations-tab" class="tab-pane">
                <div class="card"><p>Loading...</p></div>
            </div>
            <div id="poi-tab" class="tab-pane">
                <div class="card"><p>Loading...</p></div>
            </div>
            <div id="themes-tab" class="tab-pane">
                <div class="card"><p>Loading...</p></div>
            </div>
            <div id="styles-tab" class="tab-pane">
                <div class="card"><p>Loading...</p></div>
            </div>
            <div id="prompts-tab" class="tab-pane">
                <div class="card"><p>Loading...</p></div>
            </div>
            <div id="sizes-tab" class="tab-pane">
                <div class="card"><p>Loading...</p></div>
            </div>
            <div id="providers-tab" class="tab-pane">
                <div class="card"><p>Loading...</p></div>
            </div>
            <div id="profiles-tab" class="tab-pane">
                <div class="card"><p>Loading...</p></div>
            </div>
        </main>

        <!-- Bottom Tab Bar -->
        <nav class="main-nav">
            <button class="nav-btn active" data-tab="home">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1z"/>
                    <path d="M9 21V12h6v9"/>
                </svg>
                <span>Home</span>
            </button>
            <button class="nav-btn" data-tab="locations">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2C8.686 2 6 4.686 6 8c0 4.5 6 12 6 12s6-7.5 6-12c0-3.314-2.686-6-6-6z"/>
                    <circle cx="12" cy="8" r="2"/>
                </svg>
                <span>Locations</span>
            </button>
            <button class="nav-btn" data-tab="poi">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
                <span>POI</span>
            </button>
            <button class="nav-btn" data-tab="prompts">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                </svg>
                <span>Prompts</span>
            </button>
            <button class="nav-btn" data-tab="styles">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="13.5" cy="6.5" r="2.5"/>
                    <circle cx="17.5" cy="10.5" r="2.5"/>
                    <circle cx="8.5" cy="7.5" r="2.5"/>
                    <circle cx="6.5" cy="12.5" r="2.5"/>
                    <path d="M12 22a9.96 9.96 0 01-8-16"/>
                </svg>
                <span>Styles</span>
            </button>
            <button class="nav-btn" data-tab="themes">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <span>Themes</span>
            </button>
            <button class="nav-btn" data-tab="providers">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                </svg>
                <span>AI</span>
            </button>
            <button class="nav-btn" data-tab="sizes">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                    <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
                </svg>
                <span>Sizes</span>
            </button>
            <button class="nav-btn" data-tab="profiles">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span>Profile</span>
            </button>
        </nav>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
